<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobmania - Eternal Dungeon</title>
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --text: #e0e0e0; --accent: #ff0055; --accent-glow: 0 0 10px #ff0055, 0 0 20px #ff0055;
            --panel: rgba(30, 26, 45, 0.85); --panel-hover: rgba(45, 35, 70, 0.95);
            --border: #4d3a7d; --highlight: #00e5ff; 
        }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); display: flex; height: 100vh; overflow: hidden; cursor: crosshair; }
        #sidebar { width: 260px; background: rgba(15, 12, 41, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; transition: transform 0.3s ease; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
        #content { flex-grow: 1; padding: 30px 40px; overflow-y: auto; scroll-behavior: smooth; position: relative; z-index: 5; }
        #mobile-nav-toggle { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; box-shadow: var(--accent-glow); z-index: 100; cursor: pointer; transition: 0.2s; }
        .sidebar-header { padding: 20px; font-size: 24px; font-weight: 900; border-bottom: 2px solid var(--accent); text-align: center; color: white; background: rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 2px; }
        .nav-group { padding: 10px 0; overflow-y: auto; flex-grow: 1; }
        .nav-category-title { font-size: 13px; text-transform: uppercase; color: var(--highlight); padding: 15px 20px 5px; font-weight: 800; letter-spacing: 1.5px; }
        .nav-item { padding: 10px 20px; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; font-size: 15px; font-weight: 500; }
        .nav-item:hover { background: linear-gradient(90deg, rgba(255, 0, 85, 0.2), transparent); border-left-color: var(--accent); color: white; }
        h1 { margin-top: 0; font-size: 36px; border-bottom: 2px solid var(--border); padding-bottom: 15px; color: white; font-weight: 800; }
        h3 { color: var(--highlight); margin-top: 25px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; font-weight: 700; }
        .data-card { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .property-row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; align-items: flex-start; }
        .property-key { width: 220px; font-weight: 700; color: #a594fd; flex-shrink: 0; text-transform: uppercase; font-size: 13px; }
        .property-value { flex-grow: 1; word-break: break-word; line-height: 1.6; }
        .wiki-link { color: var(--highlight); text-decoration: none; font-weight: 700; cursor: pointer; padding: 2px 8px; border-radius: 4px; background: rgba(0, 229, 255, 0.15); display: inline-block; margin: 2px; border: 1px solid rgba(0, 229, 255, 0.3); }
        .wiki-link:hover { background: var(--highlight); color: #000; transform: translateY(-2px); }
        .list-chip { background: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 13px; display: inline-block; margin: 4px; color: white; font-weight: bold; }
        .wiki-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .grid-item { background: var(--panel); padding: 18px 20px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .grid-item:hover { background: var(--panel-hover); border-color: var(--accent); transform: translateY(-3px); }
        .grid-item-id { font-size: 14px; color: var(--highlight); margin-bottom: 8px; font-weight: 800; font-family: monospace; }
        .grid-item-title { font-size: 20px; font-weight: 800; color: white; }
        .store-btn { display: inline-flex; align-items: center; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 800; transition: 0.2s; cursor: pointer; }
        .btn-play { background: #3ddc84; color: #000; }
        .btn-apple { background: #ffffff; color: #000; }
        .fire-particle { position: fixed; pointer-events: none; background: radial-gradient(circle, #ffffff 5%, #ffea00 20%, #ff6600 50%, #cc0000 80%, transparent 100%); border-radius: 50%; transform: translate(-50%, -50%); mix-blend-mode: color-dodge; z-index: 9999; animation: burnOut 0.5s ease-out forwards; }
        @keyframes burnOut { 0% { width: 12px; height: 12px; opacity: 0.8; margin-top: 0; } 100% { width: 45px; height: 45px; opacity: 0; margin-top: -40px; } }
        @media (max-width: 768px) { #sidebar { position: fixed; height: 100vh; transform: translateX(-100%); width: 280px; } #sidebar.open { transform: translateX(0); } #mobile-nav-toggle { display: block; } }
    </style>
</head>
<body>
    <button id="mobile-nav-toggle" onclick="toggleNav()">☰</button>
    <div id="sidebar">
        <div class="sidebar-header">Jobmania - Eternal Dungeon</div>
        <div class="nav-group" id="nav-menu" onclick="if(window.innerWidth <= 768) toggleNav()">
            <div class="nav-item" onclick="renderHome()" style="color: var(--highlight);">🏠 Main Dashboard</div>
            <div class="nav-category-title">Game Databases</div>
            <div class="nav-item" onclick="renderCategory('characters', 'Characters')">🧑‍🤝‍🧑 Characters</div>
            <div class="nav-item" onclick="renderCategory('jobs', 'Job Classes')">🛡️ Job Classes</div>
            <div class="nav-item" onclick="renderCategory('abilities', 'Abilities')">⚔️ Abilities</div>
            <div class="nav-item" onclick="renderCategory('materials', 'Materials')">💎 Materials</div>
            <div class="nav-item" onclick="renderCategory('passives', 'Passive Skills')">✨ Passive Skills</div>
            <div class="nav-category-title">Relics & Artifacts</div>
            <div class="nav-item" onclick="renderCategory('relics', 'Relics')">🏺 Relics</div>
            <div class="nav-item" onclick="renderCategory('relicPassives', 'Relic Passives')">🔮 Relic Passives</div>
            <div class="nav-category-title">Engine Mechanics</div>
            <div class="nav-item" onclick="renderCategory('suAbilities', 'Skill Unit: Abilities')">⚙️ SU Abilities</div>
            <div class="nav-item" onclick="renderCategory('suBuffs', 'Skill Unit: Buffs')">⚙️ SU Buffs</div>
            <div class="nav-item" onclick="renderCategory('suPassives', 'Skill Unit: Passives')">⚙️ SU Passives</div>
        </div>
    </div>
    <div id="content"><div id="page-container"></div></div>
    <script>
        const API_BASE = "https://noagrp.github.io/jobmania/";
        const DB = { characters:[], jobs:[], abilities:[], crafting:[], materials:[], passives:[], relics:[], relicPassives:[], suAbilities:[], suBuffs:[], suPassives:[] };
        const Dictionary = {}; 

        async function initWiki() {
            await fetchAllData();
            buildGlobalDictionary();
            history.replaceState({ view: 'home' }, '', '#home');
            renderHome(false);
        }

        async function fetchJSON(f) { try { const r = await fetch(`${API_BASE}${f}?t=${Date.now()}`); return r.ok ? await r.json() : []; } catch(e) { return []; } }
        async function fetchAllData() {
            const data = await Promise.all([
                fetchJSON('jobmania_characters.json'), fetchJSON('jobmania_jobs.json'), fetchJSON('jobmania_abilities.json'), 
                fetchJSON('jobmania_job_crafting.json'), fetchJSON('jobmania_materials.json'), fetchJSON('jobmania_passive_skills.json'), 
                fetchJSON('jobmania_relics.json'), fetchJSON('jobmania_relic_passives.json'), fetchJSON('jobmania_skill_unit_abilities.json'), 
                fetchJSON('jobmania_skill_unit_buffes.json'), fetchJSON('jobmania_skill_unit_passive_skills.json')
            ]);
            [DB.characters, DB.jobs, DB.abilities, DB.crafting, DB.materials, DB.passives, DB.relics, DB.relicPassives, DB.suAbilities, DB.suBuffs, DB.suPassives] = data;
        }

        function extractName(item) {
            // Priority: Title (Relics) > Concatenate (Relic Passives) > Others
            let name = item.Title || item.Concatenate || item.Name || item['Ability Name'] || item.Job || item.Material || item['Passive Skill'] || item.Relic || item.Buff || item.id;
            return name || "Unknown";
        }

        function buildGlobalDictionary() {
            Object.keys(DB).forEach(cat => {
                DB[cat].forEach((item, idx) => {
                    item.wikiNumber = idx + 1;
                    const name = extractName(item).toString().trim();
                    Dictionary[`${cat}_${idx}`] = { category: cat, ref: item, originalName: name };
                });
            });
        }

        function renderHome(push = true) {
            if (push) history.pushState({ view: 'home' }, '', '#home');
            setHTML(`
                <div style="display:flex; align-items:center; gap:20px; border-bottom:2px solid var(--border); padding-bottom:20px;">
                    <img src="${API_BASE}jobmania_official_icon.png" style="width:90px; height:90px; border-radius:20px;">
                    <div><h1>Jobmania - Eternal Dungeon</h1></div>
                </div>
                <div class="data-card"><p>Welcome to the official Jobmania Database.</p>
                    <a href="https://play.google.com/store/apps/details?id=com.aubjective.jobmania" target="_blank" class="store-btn btn-play">📱 Google Play</a>
                </div>
            `);
        }

        function renderCategory(cat, title, push = true) {
            if (push) history.pushState({ view: 'cat', cat, title }, '', `#cat-${cat}`);
            let html = `<h1>${title}</h1><div class="wiki-grid">`;
            DB[cat].forEach((item, idx) => {
                html += `<div class="grid-item" onclick="renderPage('${cat}', ${idx})">
                    <div class="grid-item-id">ID #${item.wikiNumber}</div>
                    <div class="grid-item-title">${extractName(item)}</div></div>`;
            });
            setHTML(html + `</div>`);
        }

        function renderPage(cat, idx, push = true) {
            const entry = DB[cat][idx];
            if (push) history.pushState({ view: 'page', cat, idx }, '', `#${cat}-${idx}`);
            let html = `<h1>ID #${entry.wikiNumber}: ${extractName(entry)}</h1><div class="data-card">`;
            for (const [k, v] of Object.entries(entry)) {
                if (k === 'wikiNumber') continue;
                html += `<div class="property-row"><div class="property-key">${k}</div><div class="property-value">${v}</div></div>`;
            }
            setHTML(html + `</div>`);
        }

        function setHTML(h) { document.getElementById('page-container').innerHTML = h; document.getElementById('content').scrollTop = 0; }
        function toggleNav() { document.getElementById('sidebar').classList.toggle('open'); }
        window.addEventListener('popstate', e => e.state?.view === 'home' ? renderHome(false) : (e.state?.view === 'cat' ? renderCategory(e.state.cat, e.state.title, false) : (e.state?.view === 'page' ? renderPage(e.state.cat, e.state.idx, false) : null)));
        window.onload = initWiki;
        document.addEventListener('mousemove', e => { 
            const p = document.createElement('div'); p.className = 'fire-particle'; p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 500); 
        });
    </script>
</body>
</html>
