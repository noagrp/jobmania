<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobmania - Eternal Dungeon</title>
    <style>
        :root { 
            /* Vibrant RPG Theme Colors */
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --text: #e0e0e0; 
            --accent: #ff0055; 
            --accent-glow: 0 0 10px #ff0055, 0 0 20px #ff0055;
            --panel: rgba(30, 26, 45, 0.85); 
            --panel-hover: rgba(45, 35, 70, 0.95);
            --border: #4d3a7d; 
            --highlight: #00e5ff; 
        }
        
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); display: flex; height: 100vh; overflow: hidden; cursor: crosshair; }
        
        /* Layout */
        #sidebar { width: 260px; background: rgba(15, 12, 41, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; transition: transform 0.3s ease; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
        #content { flex-grow: 1; padding: 30px 40px; overflow-y: auto; scroll-behavior: smooth; position: relative; z-index: 5; }
        
        /* Mobile Nav Toggle */
        #mobile-nav-toggle { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; box-shadow: var(--accent-glow); z-index: 100; cursor: pointer; transition: 0.2s; }
        #mobile-nav-toggle:active { transform: scale(0.9); }
        
        /* Sidebar Styling */
        .sidebar-header { padding: 20px; font-size: 24px; font-weight: 900; border-bottom: 2px solid var(--accent); text-align: center; color: white; background: rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .nav-group { padding: 10px 0; overflow-y: auto; flex-grow: 1; }
        .nav-category-title { font-size: 13px; text-transform: uppercase; color: var(--highlight); padding: 15px 20px 5px; font-weight: 800; letter-spacing: 1.5px; opacity: 0.9; }
        .nav-item { padding: 10px 20px; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; font-size: 15px; font-weight: 500; }
        .nav-item:hover { background: linear-gradient(90deg, rgba(255, 0, 85, 0.2), transparent); border-left-color: var(--accent); color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        /* Typography & Elements */
        h1 { margin-top: 0; font-size: 36px; border-bottom: 2px solid var(--border); padding-bottom: 15px; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.5); font-weight: 800; }
        h3 { color: var(--highlight); margin-top: 25px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; font-weight: 700; }
        
        /* Data Cards & Rows */
        .data-card { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .property-row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; align-items: flex-start; }
        .property-row:last-child { border-bottom: none; }
        .property-key { width: 220px; font-weight: 700; color: #a594fd; flex-shrink: 0; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        .property-value { flex-grow: 1; word-break: break-word; line-height: 1.6; font-size: 15px; }
        
        /* Links & Interactive */
        .wiki-link { color: var(--highlight); text-decoration: none; font-weight: 700; cursor: pointer; padding: 2px 8px; border-radius: 4px; background: rgba(0, 229, 255, 0.15); display: inline-block; margin: 2px; transition: 0.2s; border: 1px solid rgba(0, 229, 255, 0.3); }
        .wiki-link:hover { background: var(--highlight); color: #000; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 229, 255, 0.4); }
        .list-chip { background: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 13px; display: inline-block; margin: 4px; color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        /* Grid */
        .wiki-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .grid-item { background: var(--panel); padding: 18px 20px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .grid-item:hover { background: var(--panel-hover); border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--accent-glow); }
        .grid-item::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: var(--accent); opacity: 0; transition: 0.2s; }
        .grid-item:hover::before { opacity: 1; }
        .grid-item-id { font-size: 14px; color: var(--highlight); margin-bottom: 8px; font-weight: 800; font-family: monospace; letter-spacing: 1px; }
        .grid-item-title { font-size: 20px; font-weight: 800; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        
        /* Stores & Buttons */
        .store-btn { display: inline-flex; align-items: center; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 800; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); letter-spacing: 0.5px; cursor: pointer; }
        .store-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .btn-play { background: #3ddc84; color: #000; border: 2px solid #3ddc84; }
        .btn-play:hover { background: #2bb86a; }
        .btn-apple { background: #ffffff; color: #000; border: 2px solid #ffffff; }
        .btn-apple:hover { background: #e0e0e0; }

        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--highlight); font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .spinner { border: 4px solid rgba(0, 229, 255, 0.1); border-top: 4px solid var(--highlight); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mouse Fire Effect CSS */
        .fire-particle {
            position: fixed;
            pointer-events: none;
            background: radial-gradient(circle, #ffffff 5%, #ffea00 20%, #ff6600 50%, #cc0000 80%, transparent 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            mix-blend-mode: color-dodge;
            z-index: 9999;
            animation: burnOut 0.5s ease-out forwards;
        }
        @keyframes burnOut {
            0% { width: 12px; height: 12px; opacity: 0.8; margin-top: 0; }
            100% { width: 45px; height: 45px; opacity: 0; margin-top: -40px; }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body { position: relative; }
            #sidebar { position: fixed; height: 100vh; transform: translateX(-100%); width: 280px; }
            #sidebar.open { transform: translateX(0); }
            #content { padding: 20px; }
            #mobile-nav-toggle { display: block; }
            .property-row { flex-direction: column; }
            .property-key { width: 100%; margin-bottom: 5px; }
            .property-value { width: 100%; }
            .store-btn { width: 100%; justify-content: center; margin-bottom: 10px; }
            .header-flex { flex-direction: column; align-items: flex-start !important; gap: 15px !important; }
        }
    </style>
</head>
<body>

    <button id="mobile-nav-toggle" onclick="toggleNav()">☰</button>

    <div id="sidebar">
        <div class="sidebar-header">Jobmania - Eternal Dungeon</div>
        <div class="nav-group" id="nav-menu" onclick="if(window.innerWidth <= 768) toggleNav()">
            <div class="nav-item" onclick="renderHome()" style="color: var(--highlight);">🏠 Main Dashboard</div>
            
            <div class="nav-category-title">Game Databases</div>
            <div class="nav-item" onclick="renderCategory('characters', 'Characters')">🧑‍🤝‍🧑 Characters</div>
            <div class="nav-item" onclick="renderCategory('jobs', 'Job Classes')">🛡️ Job Classes</div>
            <div class="nav-item" onclick="renderCategory('abilities', 'Abilities')">⚔️ Abilities</div>
            <div class="nav-item" onclick="renderCategory('materials', 'Materials')">💎 Materials</div>
            <div class="nav-item" onclick="renderCategory('passives', 'Passive Skills')">✨ Passive Skills</div>
            
            <div class="nav-category-title">Relics & Artifacts</div>
            <div class="nav-item" onclick="renderCategory('relics', 'Relics')">🏺 Relics</div>
            <div class="nav-item" onclick="renderCategory('relicPassives', 'Relic Passives')">🔮 Relic Passives</div>
            
            <div class="nav-category-title">Engine Mechanics</div>
            <div class="nav-item" onclick="renderCategory('suAbilities', 'Skill Unit: Abilities')">⚙️ SU Abilities</div>
            <div class="nav-item" onclick="renderCategory('suBuffs', 'Skill Unit: Buffs')">⚙️ SU Buffs</div>
            <div class="nav-item" onclick="renderCategory('suPassives', 'Skill Unit: Passives')">⚙️ SU Passives</div>
        </div>
    </div>

    <div id="content">
        <div id="page-container">
            <div class="loading">
                <div class="spinner"></div>
                Initializing Jobmania API...
            </div>
        </div>
    </div>

    <script>
        /**
         * FIRE CURSOR EFFECT ENGINE
         */
        document.addEventListener('mousemove', (e) => {
            createFire(e.clientX, e.clientY, false);
        });
        
        document.addEventListener('mousedown', (e) => {
            for(let i = 0; i < 8; i++) {
                setTimeout(() => {
                    createFire(e.clientX + (Math.random() * 30 - 15), e.clientY + (Math.random() * 30 - 15), true);
                }, i * 40);
            }
        });

        function createFire(x, y, isClick) {
            const particle = document.createElement('div');
            particle.className = 'fire-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            if (isClick) {
                particle.style.width = '20px';
                particle.style.height = '20px';
                particle.style.animationDuration = '0.8s';
            }
            
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 800);
        }

        /**
         * JOBMANIA WIKI ENGINE
         */

        const API_BASE = "https://noagrp.github.io/jobmania/";
        const CACHE_BUSTER = "?t=" + Date.now();

        const DB = {
            characters: [], jobs: [], abilities: [], crafting: [], materials: [],
            passives: [], relics: [], relicPassives: [],
            suAbilities: [], suBuffs: [], suPassives: []
        };
        const Dictionary = {}; 

        async function initWiki() {
            try {
                await fetchAllData();
                buildGlobalDictionary();
                buildCraftingLinks();
                history.replaceState({ view: 'home' }, '', '#home');
                renderHome(false);
            } catch (error) {
                setHTML(`<h1>Critical Error</h1><div class="data-card"><p>Failed to connect to the Jobmania API: ${error.message}</p></div>`);
            }
        }

        async function fetchJSON(filename) {
            try {
                const response = await fetch(`${API_BASE}${filename}${CACHE_BUSTER}`);
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.warn(`Could not load ${filename}`);
                return [];
            }
        }

        async function fetchAllData() {
            const [
                chars, jobs, abilities, crafting, materials, 
                passives, relics, relicPassives, 
                suAbil, suBuff, suPass
            ] = await Promise.all([
                fetchJSON('jobmania_characters.json'), fetchJSON('jobmania_jobs.json'), fetchJSON('jobmania_abilities.json'), 
                fetchJSON('jobmania_job_crafting.json'), fetchJSON('jobmania_materials.json'),
                fetchJSON('jobmania_passive_skills.json'), fetchJSON('jobmania_relics.json'), fetchJSON('jobmania_relic_passives.json'),
                fetchJSON('jobmania_skill_unit_abilities.json'), fetchJSON('jobmania_skill_unit_buffes.json'), fetchJSON('jobmania_skill_unit_passive_skills.json')
            ]);

            DB.characters = chars; DB.jobs = jobs; DB.abilities = abilities; 
            DB.crafting = crafting; DB.materials = materials;
            DB.passives = passives; DB.relics = relics; DB.relicPassives = relicPassives;
            DB.suAbilities = suAbil; DB.suBuffs = suBuff; DB.suPassives = suPass;
        }

        function extractName(item) {
            // Specific priority for Relics (Title) and Relic Passives (Concatenate)
            let name = item.Title || item.Concatenate || item.Name || item['Ability Name'] || item.Job || item.Material || 
                       item['Passive Skill'] || item.Passive || item['Passive Name'] ||
                       item.Relic || item['Relic Name'] || item['Relic Passive'] || 
                       item['Ability/Switch Skill'] || item.Buff || item.id;
            return name || "Unknown";
        }

        function buildGlobalDictionary() {
            Object.keys(DB).forEach(cat => {
                DB[cat].forEach((item, index) => {
                    item.wikiNumber = index + 1; 
                    const name = extractName(item).toString().trim();
                    Dictionary[`${cat}_${index}`] = { category: cat, ref: item, originalName: name };
                });
            });
        }

        function buildCraftingLinks() {
            DB.crafting.forEach(recipe => {
                const targetJob = recipe.target_class;
                const reqMat = recipe.material_required;
                const srcClass = recipe.source_class;
                if (reqMat && Object.values(Dictionary).find(d => d.originalName === reqMat)) {
                    const matRef = Object.values(Dictionary).find(d => d.originalName === reqMat).ref;
                    if (!matRef.usedInRecipes) matRef.usedInRecipes = [];
                    matRef.usedInRecipes.push(`Combines with ${srcClass} for ${targetJob}`);
                }
                if (targetJob && Object.values(Dictionary).find(d => d.originalName === targetJob)) {
                    const jobRef = Object.values(Dictionary).find(d => d.originalName === targetJob).ref;
                    jobRef.craftingRecipe = `Combine ${srcClass} + ${reqMat}`;
                }
            });
        }

        function parseTextForLinks(text) {
            if (!text || text === "") return '<span style="color:#666;">Null</span>';
            let processedText = String(text);
            Object.values(Dictionary).forEach(d => {
                if (processedText.includes(d.originalName) && d.originalName.length > 3) {
                    const idx = Object.keys(Dictionary).find(key => Dictionary[key] === d).split('_')[1];
                    processedText = processedText.replace(d.originalName, `<a class="wiki-link" onclick="renderPage('${d.category}', ${idx})">${d.originalName}</a>`);
                }
            });
            return processedText;
        }

        function renderHome(push = true) {
            if (push) history.pushState({ view: 'home' }, '', '#home');
            setHTML(`
                <div class="header-flex" style="display: flex; align-items: center; gap: 20px; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 25px;">
                    <img src="${API_BASE}jobmania_official_icon.png" alt="Jobmania Icon" style="width: 90px; height: 90px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); object-fit: cover;">
                    <div>
                        <h1 style="border: none; padding: 0; margin: 0; font-size: 34px;">Jobmania - Eternal Dungeon</h1>
                        <div style="color: var(--highlight); font-weight: 800; margin-top: 6px; font-size: 14px; letter-spacing: 1px;">AUBJECTIVE TECHNOLOGY LTD.</div>
                        <div style="color: #aaa; font-size: 12px; margin-top: 4px; font-weight: 600;">Contains Ads • In-app purchases</div>
                    </div>
                </div>

                <div class="data-card" style="border-left: 5px solid var(--accent);">
                    <p style="font-size: 16px; margin-top: 0; line-height: 1.6;">
                        Pick a Hero and a job then embark on an eternal journey of dungeon descending. Acquire random abilities and jobs through the journey and build your own unique play style. How far can you go?
                    </p>
                    <h3 style="color: white; margin-top: 25px; border-bottom: 1px dashed var(--border); padding-bottom: 8px;">Features</h3>
                    <ul style="line-height: 1.8; color: #ddd; padding-left: 20px; font-size: 15px;">
                        <li><strong>Rogue lite</strong>, procedural enemies and events generation.</li>
                        <li><strong>Dungeon crawler</strong>, descend into the dungeon as much as you can.</li>
                        <li><strong>Strategic deck building</strong>, build your own unique deck by adding abilities into your deck via chests and defeating enemies.</li>
                        <li><strong>RPG Turn-based combat system</strong>, complex but easy to play. Defeat tons of different enemies, challenging but addictive.</li>
                        <li><strong>Equip 3 jobs at once</strong>, swap, and use their abilities strategically for powerful synergy.</li>
                        <li><strong>Crafting:</strong> Combine jobs and materials to craft new unique jobs.</li>
                        <li><strong>Gacha:</strong> Get new heroes from Gacha, enemies defeated from the last run will appear in a special Gacha pool!</li>
                        <li><strong>Relics:</strong> Collect special relics to enhance your build further.</li>
                        <li><strong>References:</strong> A lot of Memes, Anime and Movies references in the game!</li>
                        <li><strong>Free</strong> with ads and in-app purchases, remove all ads with one purchase.</li>
                        <li><strong>Portrait screen only</strong>, you can play this game with one hand.</li>
                    </ul>
                    <div style="margin: 30px 0 10px; display: flex; gap: 15px; flex-wrap: wrap;">
                        <a href="https://play.google.com/store/apps/details?id=com.aubjective.jobmania" target="_blank" class="store-btn btn-play">📱 Google Play</a>
                        <a href="https://apps.apple.com/app/jobmania-eternal-crusade/id1531238064" target="_blank" class="store-btn btn-apple">🍎 App Store</a>
                        <a href="https://discord.gg/6U5FNFVrwb" target="_blank" class="store-btn" style="background: #5865F2; color: white; border: 2px solid #5865F2;">💬 Join Discord</a>
                    </div>
                </div>
            `);
        }

        function renderCategory(cat, title, push = true) {
            if (push) history.pushState({ view: 'cat', cat, title }, '', `#cat-${cat}`);
            let html = `<h1>${title}</h1><div class="wiki-grid">`;
            DB[cat].forEach((item, idx) => {
                html += `<div class="grid-item" onclick="renderPage('${cat}', ${idx})">
                    <div class="grid-item-id">ID #${item.wikiNumber}</div>
                    <div class="grid-item-title">${extractName(item)}</div></div>`;
            });
            setHTML(html + `</div>`);
        }

        function renderPage(cat, idx, push = true) {
            const entry = DB[cat][idx];
            if (push) history.pushState({ view: 'page', cat, idx }, '', `#${cat}-${idx}`);
            let html = `<h1>ID #${entry.wikiNumber}: ${extractName(entry)}</h1><div class="data-card">`;
            for (const [k, v] of Object.entries(entry)) {
                if (k === 'wikiNumber' || k === 'usedInRecipes' || k === 'craftingRecipe') continue;
                html += `<div class="property-row"><div class="property-key">${k}</div><div class="property-value">${parseTextForLinks(v)}</div></div>`;
            }
            if (entry.craftingRecipe) html += `<h3>Crafting Recipe</h3><div class="property-row"><div class="property-key">Recipe</div><div class="property-value">${parseTextForLinks(entry.craftingRecipe)}</div></div>`;
            if (entry.usedInRecipes) html += `<h3>Used to Craft</h3><ul>${entry.usedInRecipes.map(r => `<li>${parseTextForLinks(r)}</li>`).join('')}</ul>`;
            setHTML(html + `</div>`);
        }

        function setHTML(h) { document.getElementById('page-container').innerHTML = h; document.getElementById('content').scrollTop = 0; }
        function toggleNav() { document.getElementById('sidebar').classList.toggle('open'); }
        window.addEventListener('popstate', e => e.state?.view === 'home' ? renderHome(false) : (e.state?.view === 'cat' ? renderCategory(e.state.cat, e.state.title, false) : (e.state?.view === 'page' ? renderPage(e.state.cat, e.state.idx, false) : null)));
        window.onload = initWiki;
    </script>
</body>
</html>
